version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: shakthi
      POSTGRES_PASSWORD: StrongPassword123
      POSTGRES_DB: shakthidb
    restart: always

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    restart: always

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://shakthi:StrongPassword123@postgres:5432/shakthidb
      - OLLAMA_URL=http://172.31.39.22:11434
    depends_on:
      - postgres
    restart: always
